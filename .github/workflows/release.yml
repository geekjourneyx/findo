name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  checks:
    name: Release checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run release check
        run: make release-check

  build:
    name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
    needs: checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip
          - goos: windows
            goarch: arm64
            ext: ".exe"
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          NAME="findo_${VERSION}_${GOOS}_${GOARCH}"
          mkdir -p "dist/${NAME}"
          go build -buildvcs=false -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "dist/${NAME}/findo${{ matrix.ext }}" ./cmd/findo
          cp README.md LICENSE CHANGELOG.md "dist/${NAME}/"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && zip -r "${NAME}.zip" "${NAME}")
          else
            tar -C dist -czf "dist/${NAME}.tar.gz" "${NAME}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: findo-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/findo_*.${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: findo-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum findo_* > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/findo_*
            dist/SHA256SUMS
          generate_release_notes: true

